name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      RAILS_ENV: test
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v5

      - name: Install system packages
        run: sudo apt-get update && sudo apt-get install -y libpq-dev libvips postgresql-client

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare test database
        run: bundle exec rails db:prepare

      - name: Run test suite
        run: bundle exec rails test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Coolify deployment
        env:
          COOLIFY_DEPLOY_TOKEN: ${{ secrets.COOLIFY_DEPLOY_TOKEN }}
        run: |
          curl --fail --silent --show-error \
            --url "https://mserver.gitgar.com/api/v1/deploy?uuid=bgyb9zzcwbiqwzwpscyexwud" \
            -X POST \
            -H "Authorization: Bearer ${COOLIFY_DEPLOY_TOKEN}" \
            -H "Accept: application/json"
